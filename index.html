<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calculadora USDT Venezuela</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#f1f5f9;
}

.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#facc15 0%,#1d4ed8 50%,#dc2626 100%);
  color:white;
  padding:25px;
}

.header h1{
  margin:0;
  font-size:28px;
}

/* CONTENT */
.content{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

/* RESULTADO */
.result{
  margin-top:20px;
  background:#0f172a;
  color:#22c55e;
  padding:15px;
  border-radius:12px;
  white-space:pre-wrap;
}

/* PANEL DERECHO */
.card{
  background:#f8fafc;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.label{
  font-size:12px;
  color:#64748b;
}

.value{
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Calculadora USDT Venezuela</h1>
</div>

<div class="content">

<div>
<label>Monto USDT</label>
<input id="monto" placeholder="1000">

<label>Precio Binance (Bs)</label>
<input id="binance" placeholder="636">

<label>Tasa subasta</label>
<input id="tasa" placeholder="571">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div>
</div>

<div>

<div class="card">
<div class="label">Ganancia</div>
<div class="value" id="ganancia">-</div>
</div>

<div class="card">
<div class="label">USD Finales</div>
<div class="value" id="final">-</div>
</div>

<div class="card">
<div class="label">Costo Real</div>
<div class="value" id="costo">-</div>
</div>

<div class="card">
<div class="label">Comisión Total</div>
<div class="value">7.3%</div>
</div>

</div>

</div>
</div>

<script>
function calcular(){

let monto=parseFloat(document.getElementById("monto").value);
let binance=parseFloat(document.getElementById("binance").value);
let tasa=parseFloat(document.getElementById("tasa").value);

// COMPRA
let bs=monto*tasa;
let bs_total=bs*1.005;

// COSTO REAL
let costo=bs_total/binance;

// COMISIONES (incluye Angeli)
let comisiones=2.5+1+3.3+0.5;
let usd_final=monto*(1-comisiones/100);

// GANANCIA
let ganancia=usd_final-costo;

// MOSTRAR
document.getElementById("ganancia").innerText=ganancia.toFixed(2)+" USDT";
document.getElementById("final").innerText=usd_final.toFixed(2);
document.getElementById("costo").innerText=costo.toFixed(2);

document.getElementById("resultado").innerText=
"USD finales: "+usd_final.toFixed(2)+
"\nCosto real: "+costo.toFixed(2)+
"\nGanancia: "+ganancia.toFixed(2);

}
</script>

</body>
</html>
